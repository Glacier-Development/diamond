<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Diamond - High-performance web proxy optimized for low-end hardware">
  <meta name="theme-color" content="#1a1a2e">
  <title>Diamond Proxy</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- App Container -->
  <div class="app-container">
    <!-- Browser Header -->
    <header class="browser-header">
      <!-- Tab Bar -->
      <div class="tab-bar">
        <div id="tabsList" class="tabs-list"></div>
        <button id="newTabBtn" class="new-tab-btn" aria-label="New Tab">
          <i class="fas fa-plus"></i>
        </button>
      </div>
      
      <!-- Navigation Controls -->
      <div class="nav-controls">
        <div class="nav-buttons">
          <button id="backBtn" class="nav-btn" aria-label="Back">
            <i class="fas fa-arrow-left"></i>
          </button>
          <button id="forwardBtn" class="nav-btn" aria-label="Forward">
            <i class="fas fa-arrow-right"></i>
          </button>
          <button id="refreshBtn" class="nav-btn" aria-label="Refresh">
            <i class="fas fa-redo"></i>
          </button>
          <button id="homeBtn" class="nav-btn" aria-label="Home">
            <i class="fas fa-home"></i>
          </button>
        </div>
        
        <div class="address-bar-container">
          <i id="secureIcon" class="fas fa-lock secure-icon"></i>
          <input 
            type="text" 
            id="addressBar" 
            class="address-bar"
            placeholder="Enter URL or search..."
            autocomplete="off"
            spellcheck="false"
          >
          <button id="goBtn" class="go-btn" aria-label="Go">
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
        
        <div class="menu-buttons">
          <button id="adminBtn" class="menu-btn" aria-label="Admin Panel">
            <i class="fas fa-cog"></i>
          </button>
        </div>
      </div>
    </header>
    
    <!-- Browser Content -->
    <main class="browser-content">
      <!-- Welcome Screen -->
      <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-card">
          <div class="logo-area">
            <div class="logo-icon">◆</div>
            <h1>Diamond Proxy v3</h1>
            <p class="subtitle">High-performance web proxy</p>
          </div>
          
          <div class="search-box-large">
            <input 
              type="text" 
              id="mainSearchInput"
              placeholder="Search Google or enter URL..."
              autocomplete="off"
              spellcheck="false"
            >
            <button id="mainSearchBtn">
              <i class="fas fa-search"></i> Search
            </button>
          </div>
          
          <div class="quick-links">
            <button class="quick-link" data-url="https://www.google.com/">
              <i class="fab fa-google"></i>
              <span>Google</span>
            </button>
            <button class="quick-link" data-url="https://www.youtube.com/">
              <i class="fab fa-youtube"></i>
              <span>YouTube</span>
            </button>
            <button class="quick-link" data-url="https://discord.com/">
              <i class="fab fa-discord"></i>
              <span>Discord</span>
            </button>
            <button class="quick-link" data-url="https://www.reddit.com/">
              <i class="fab fa-reddit"></i>
              <span>Reddit</span>
            </button>
          </div>
        </div>
      </div>
      
      <!-- Proxy Iframe -->
      <iframe id="proxyFrame" class="proxy-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-top-navigation"></iframe>
    </main>
  </div>
  
  <!-- Admin Panel Modal (Ctrl+Shift+B to open) -->
  <div id="adminModal" class="modal-overlay">
    <div class="modal-content admin-modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-cog"></i> Admin Panel</h2>
        <button id="closeAdmin" class="close-modal">×</button>
      </div>
      
      <div class="modal-body">
        <!-- Login View -->
        <div id="adminLoginView">
          <p class="admin-info">Press Ctrl+Shift+B to toggle this panel. Enter password to access admin controls.</p>
          <div class="control-group">
            <label for="adminPassword">Admin Password</label>
            <input 
              type="password" 
              id="adminPassword" 
              class="admin-input"
              placeholder="Enter password"
              autocomplete="current-password"
            >
            <p id="adminError" class="error-msg"></p>
          </div>
          <button id="adminLoginBtn" class="admin-action-btn primary">Login</button>
        </div>
        
        <!-- Admin Controls View -->
        <div id="adminControlsView" class="hidden">
          <div class="control-group">
            <label for="motdInput">Message of the Day</label>
            <input 
              type="text" 
              id="motdInput" 
              class="admin-input"
              placeholder="Enter MOTD message"
            >
          </div>
          
          <div class="toggle-row">
            <span>Enable MOTD</span>
            <label class="switch">
              <input type="checkbox" id="motdToggle">
              <span class="slider round"></span>
            </label>
          </div>
          
          <button id="saveMotdBtn" class="admin-action-btn">Save MOTD</button>
          
          <div class="toggle-row">
            <span>Maintenance Mode</span>
            <label class="switch">
              <input type="checkbox" id="maintenanceToggle" onchange="toggleMaintenance()">
              <span class="slider round"></span>
            </label>
          </div>
          
          <button id="restartServerBtn" class="admin-action-btn danger">⚠️ Restart Server</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/sw-register.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/browser.js"></script>
</body>
</html>
